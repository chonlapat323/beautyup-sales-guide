<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>คู่มือการใช้งาน — BeautyUp Sales</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Leelawadee UI', 'Segoe UI', Tahoma, system-ui, sans-serif;
    background: #f0fdf4;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
  }
  .logo {
    width: 60px; height: 60px;
    background: #16a34a;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 900; color: #fff;
    margin-bottom: 16px;
  }
  h1 { font-size: 22px; font-weight: 800; color: #052e16; margin-bottom: 6px; }
  .sub { font-size: 14px; color: #6b7280; margin-bottom: 36px; }
  .cards { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 600px; }
  .card {
    background: #fff;
    border: 1px solid #bbf7d0;
    border-radius: 14px;
    padding: 28px 28px 24px;
    text-decoration: none;
    width: 260px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(22,163,74,0.12); }
  .card-icon { font-size: 32px; margin-bottom: 12px; }
  .card-title { font-size: 17px; font-weight: 800; color: #052e16; margin-bottom: 6px; }
  .card-desc { font-size: 13px; color: #6b7280; line-height: 1.55; }
  .card-arrow {
    display: inline-block;
    margin-top: 16px;
    font-size: 12px;
    font-weight: 700;
    color: #16a34a;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
  <div class="logo">B</div>
  <h1>BeautyUp Sales</h1>
  <p class="sub">เลือกคู่มือที่ต้องการ</p>
  <div class="cards">
    <a href="admin-guide.html" class="card">
      <div class="card-icon">🖥️</div>
      <div class="card-title">Admin Panel</div>
      <div class="card-desc">คู่มือสำหรับผู้ดูแลระบบ — อนุมัติสลิป ค่าคอม ตั้งค่า และจัดการผู้ใช้</div>
      <div class="card-arrow">เปิดคู่มือ →</div>
    </a>
    <a href="mobile-guide.html" class="card">
      <div class="card-icon">📱</div>
      <div class="card-title">Mobile App</div>
      <div class="card-desc">คู่มือสำหรับเซล — บันทึกการเยี่ยม ดูค่าคอม และเชื่อมต่อ LINE</div>
      <div class="card-arrow">เปิดคู่มือ →</div>
    </a>
  </div>
</body>
</html>
